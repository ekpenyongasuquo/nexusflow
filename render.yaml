# render.yaml — NexusFlow deployment on Render.com
# Free tier: 512MB RAM, 0.1 CPU, auto-sleep after 15min inactivity
# Upgrade to $7/month Starter plan for always-on

services:
  - type: web
    name: nexusflow-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn nexusflow.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexusflow-db
          property: connectionString
      - key: AUDIT_DB_URL
        value: sqlite+aiosqlite:///./nexusflow_audit.db
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
      - key: POLICY_FILE_PATH
        value: ./policies/default.yaml
      # Add these manually in Render dashboard:
      # SLACK_BOT_TOKEN, JIRA_API_TOKEN, GITHUB_TOKEN, OPENROUTER_API_KEY

databases:
  - name: nexusflow-db
    databaseName: nexusflow
    user: nexusflow
    plan: free

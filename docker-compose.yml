version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexusflow-postgres
    environment:
      POSTGRES_USER: nexusflow
      POSTGRES_PASSWORD: nexusflow_dev_password
      POSTGRES_DB: nexusflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NexusFlow API ───────────────────────────────────────────────────────────
  nexusflow-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: nexusflow-api
    environment:
      DATABASE_URL: postgresql+asyncpg://nexusflow:nexusflow_dev_password@postgres:5432/nexusflow
      AUDIT_DB_URL: sqlite+aiosqlite:////app/data/nexusflow_audit.db
      SECRET_KEY: dev-secret-key-change-in-production-minimum-32-chars
      APP_ENV: development
      LOG_LEVEL: INFO
      POLICY_FILE_PATH: /app/policies/default.yaml
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - audit_data:/app/data
      - ./policies:/app/policies:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  nexusflow-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusflow-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - nexusflow-api
    restart: unless-stopped

volumes:
  postgres_data:
  audit_data:
